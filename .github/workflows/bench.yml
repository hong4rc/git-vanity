name: Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Bencher CLI
        uses: bencherdev/bencher@main
        with:
          version: "0.6.0"

      - name: Run benchmarks
        run: cargo bench --bench hash_bench -- --output-format bencher | tee output.txt

      - name: Upload to Bencher
        if: github.event_name == 'push'
        env:
          BENCHER_API_TOKEN: ${{ secrets.BENCHER_API_TOKEN }}
        run: |
          bencher run \
            --project git-vanity \
            --branch main \
            --testbed ubuntu-latest \
            --adapter rust_bench \
            --threshold-measure latency \
            --threshold-test percentage \
            --threshold-upper-boundary 0.10 \
            --thresholds-reset \
            --err \
            --file output.txt

      - name: PR benchmark comment
        if: github.event_name == 'pull_request'
        env:
          BENCHER_API_TOKEN: ${{ secrets.BENCHER_API_TOKEN }}
        run: |
          bencher run \
            --project git-vanity \
            --branch "${{ github.head_ref }}" \
            --start-point main \
            --testbed ubuntu-latest \
            --adapter rust_bench \
            --threshold-measure latency \
            --threshold-test percentage \
            --threshold-upper-boundary 0.10 \
            --thresholds-reset \
            --err \
            --file output.txt \
            --github-actions "${{ secrets.GITHUB_TOKEN }}"
